<!doctype html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Teamteiler — Teams für den Sportunterricht</title>
<link rel="icon" href="data:,">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap');

  :root{
    --bg:#16232E; --panel:#1E2E3A; --panel-border:#24384A; --border:#2D4356;
    --text:#EAEFF2; --muted:#7C93A3; --muted2:#9FB3C1; --accent:#D9762A; --accent-text:#1B120A;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Work Sans',sans-serif;}
  button{cursor:pointer;font-family:inherit;}
  input{font-family:inherit;}

  header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--panel-border);position:sticky;top:0;background:var(--bg);z-index:10;}
  .header-left{display:flex;align-items:center;gap:12px;}
  .logo{width:38px;height:38px;border-radius:8px;background:var(--accent);color:var(--accent-text);display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-weight:700;font-size:15px;}
  .app-title{font-family:'Oswald',sans-serif;font-weight:600;font-size:19px;line-height:1.1;}
  .app-subtitle{font-size:12px;color:var(--muted);margin-top:2px;}

  .class-picker-wrap{position:relative;}
  .class-picker-btn{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:9px;font-size:14px;}
  .class-dropdown{position:absolute;right:0;top:calc(100% + 6px);background:var(--panel);border:1px solid var(--border);border-radius:10px;min-width:220px;padding:6px;box-shadow:0 12px 28px rgba(0,0,0,.4);z-index:20;display:none;}
  .class-dropdown.open{display:block;}
  .class-dropdown-item{display:flex;align-items:center;padding:8px;border-radius:6px;font-size:14px;}
  .class-dropdown-item .name{flex:1;cursor:pointer;}
  .class-dropdown-item .name .count{opacity:.5;}
  .class-dropdown-divider{height:1px;background:var(--border);margin:6px 2px;}
  .new-class-btn{display:flex;align-items:center;gap:8px;width:100%;background:transparent;border:none;color:var(--accent);font-size:14px;padding:8px;font-weight:500;}

  .icon-btn{background:transparent;border:none;color:var(--muted);padding:4px;display:inline-flex;}

  .empty-state{display:flex;flex-direction:column;align-items:center;text-align:center;padding:70px 24px;gap:10px;}
  .empty-icon{width:76px;height:76px;border-radius:50%;background:var(--panel);display:flex;align-items:center;justify-content:center;margin-bottom:8px;font-size:28px;}
  .empty-title{font-family:'Oswald',sans-serif;font-size:18px;font-weight:600;}
  .empty-text{font-size:14px;color:var(--muted);max-width:280px;}

  .btn-primary{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:var(--accent-text);border:none;padding:12px 20px;border-radius:10px;font-size:15px;font-weight:600;margin-top:12px;}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed;}
  .btn-primary-sm{display:inline-flex;align-items:center;gap:6px;background:var(--accent);color:var(--accent-text);border:none;padding:10px 14px;border-radius:9px;font-size:14px;font-weight:600;white-space:nowrap;}

  .sub-header{padding:20px 20px 0;display:flex;flex-direction:column;gap:14px;}
  .class-name-row{display:flex;align-items:center;gap:8px;}
  .class-name{font-family:'Oswald',sans-serif;font-size:22px;font-weight:600;margin:0;}
  .class-name-input{font-family:'Oswald',sans-serif;font-size:20px;font-weight:600;background:var(--panel);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:4px 8px;}

  .tab-row{display:flex;gap:6px;border-bottom:1px solid var(--panel-border);}
  .tab{background:transparent;border:none;color:var(--muted);padding:10px 4px;margin-right:20px;font-size:14px;font-weight:500;border-bottom:2px solid transparent;}
  .tab.active{color:var(--text);font-weight:600;border-bottom:2px solid var(--accent);}

  .content{padding:20px;max-width:720px;margin:0 auto;}

  .add-row{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
  .text-input{flex:1;min-width:140px;background:var(--panel);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:10px 12px;font-size:14px;}

  .skill-picker{display:flex;gap:2px;align-items:center;}
  .skill-dot{background:transparent;border:none;padding:2px;font-size:13px;color:#3A3320;}
  .skill-dot.filled{color:#D9A427;}

  .empty-roster{color:var(--muted);font-size:14px;padding:20px 0;}
  .roster-list{display:flex;flex-direction:column;gap:6px;}
  .roster-row{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--panel-border);border-radius:9px;padding:9px 12px;}
  .roster-name{flex:1;font-size:14.5px;}
  .roster-name.excluded{opacity:.4;}
  .chip-btn{background:#24384A;border:1px solid var(--border);color:var(--muted2);font-size:12px;padding:4px 9px;border-radius:999px;font-family:'JetBrains Mono',monospace;}
  .chip-btn.active{background:#3A2420;border-color:#C8442C;color:#E8A798;}
  .roster-footer{margin-top:14px;font-size:12.5px;color:var(--muted);font-family:'JetBrains Mono',monospace;}

  .control-panel{background:var(--panel);border:1px solid var(--panel-border);border-radius:12px;padding:18px;display:flex;flex-direction:column;gap:16px;margin-bottom:22px;}
  .control-label{font-size:12.5px;color:var(--muted);font-weight:600;letter-spacing:.4px;text-transform:uppercase;}
  .stepper{display:flex;align-items:center;gap:14px;}
  .stepper-btn{width:34px;height:34px;border-radius:8px;background:#24384A;border:1px solid var(--border);color:var(--text);font-size:18px;}
  .stepper-value{font-family:'JetBrains Mono',monospace;font-size:18px;min-width:20px;text-align:center;}
  .mode-row{display:flex;gap:8px;flex-wrap:wrap;}
  .mode-btn{display:inline-flex;align-items:center;gap:7px;background:#24384A;border:1px solid var(--border);color:var(--muted2);padding:9px 13px;border-radius:9px;font-size:13.5px;}
  .mode-btn.active{background:var(--accent);border-color:var(--accent);color:var(--accent-text);font-weight:600;}
  .control-hint{font-size:12.5px;color:var(--muted);}
  .drag-hint{font-size:12.5px;color:var(--muted);margin-bottom:10px;text-align:center;}

  .teams-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;}
  .team-card{border:1px solid;border-radius:12px;overflow:hidden;min-height:140px;display:flex;flex-direction:column;}
  .team-header{padding:9px 12px;font-family:'Oswald',sans-serif;font-weight:600;font-size:14px;display:flex;justify-content:space-between;align-items:center;}
  .team-count{font-family:'JetBrains Mono',monospace;font-size:12px;opacity:.85;}
  .team-body{padding:10px;display:flex;flex-direction:column;gap:6px;flex:1;}
  .team-empty{color:#5C7285;font-size:13px;text-align:center;padding:10px 0;}
  .student-chip{background:rgba(255,255,255,.06);border-radius:7px;padding:8px 10px;font-size:13.5px;cursor:grab;user-select:none;touch-action:none;display:flex;flex-direction:column;gap:4px;}
  .student-chip.dragging{opacity:.35;}
  .chip-stars{font-size:10px;color:#D9A427;}
  .chip-stars .dim{color:#3A3320;}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ===== Teamteiler — eigenständige Version für GitHub Pages ===== */

const LEIBCHEN = [
  { name: "Rot", bg: "#C8442C", bgSoft: "#3A2420", text: "#FDEEE8" },
  { name: "Blau", bg: "#2C6E9E", bgSoft: "#1E2E3A", text: "#E9F3FB" },
  { name: "Gelb", bg: "#D9A427", bgSoft: "#3A3320", text: "#FBF3DC" },
  { name: "Grün", bg: "#3E8B5C", bgSoft: "#213A2A", text: "#E7F6ED" },
  { name: "Lila", bg: "#7C5FA6", bgSoft: "#2C2438", text: "#F1EBF9" },
  { name: "Orange", bg: "#D9762A", bgSoft: "#3A2A1B", text: "#FCEADC" },
];

const uid = () => Math.random().toString(36).slice(2, 10);
const STORAGE_KEY = "teamteiler-classes";

// ---- State ----
let state = {
  classes: [],
  activeClassId: null,
  view: "roster", // roster | generate
  newName: "",
  newSkill: 3,
  bulkMode: false,
  bulkText: "",
  editingClassName: false,
  showClassPicker: false,
  numTeams: 4,
  studentsPerTeam: 4,
  sizeMode: "teams", // teams | perTeam
  mode: "balanced", // random | balanced | stacked
  teams: null,
  teamsWarning: null,
  excluded: {}, // studentId -> true
  pickCount: 3,
  pickNoRepeat: true,
  pickedIds: {},
  pickResult: null,
};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      if (data && data.classes) {
        state.classes = data.classes;
        state.activeClassId = data.activeClassId || (data.classes[0] && data.classes[0].id) || null;
      }
    }
  } catch (e) {
    console.warn("Konnte gespeicherte Klassen nicht laden:", e);
  }
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ classes: state.classes, activeClassId: state.activeClassId }));
  } catch (e) {
    console.warn("Konnte Klassen nicht speichern:", e);
  }
}

function getActiveClass() {
  return state.classes.find(c => c.id === state.activeClassId) || null;
}

// ---- Actions ----
function createClass() {
  const c = { id: uid(), name: `Klasse ${state.classes.length + 1}`, students: [], rules: { together: [], apart: [] } };
  state.classes.push(c);
  state.activeClassId = c.id;
  state.view = "roster";
  state.showClassPicker = false;
  saveState();
  render();
}

function deleteClass(id) {
  state.classes = state.classes.filter(c => c.id !== id);
  if (state.activeClassId === id) {
    state.activeClassId = state.classes[0] ? state.classes[0].id : null;
    state.teams = null;
  }
  saveState();
  render();
}

function renameActiveClass(name) {
  const c = getActiveClass();
  if (c) c.name = name;
  saveState();
  render();
}

function addStudent() {
  const name = state.newName.trim();
  const c = getActiveClass();
  if (!name || !c) return;
  c.students.push({ id: uid(), name, skill: state.newSkill });
  state.newName = "";
  state.newSkill = 3;
  saveState();
  render();
}

function addBulkStudents() {
  const c = getActiveClass();
  if (!c) return;
  const names = state.bulkText
    .split(/[\n,]+/)
    .map(n => n.trim())
    .filter(n => n.length > 0);
  if (names.length === 0) return;
  names.forEach(name => c.students.push({ id: uid(), name, skill: 3 }));
  state.bulkText = "";
  saveState();
  render();
}

function removeStudent(id) {
  const c = getActiveClass();
  if (!c) return;
  c.students = c.students.filter(s => s.id !== id);
  delete state.excluded[id];
  saveState();
  render();
}

function updateStudentSkill(id, skill) {
  const c = getActiveClass();
  if (!c) return;
  const s = c.students.find(s => s.id === id);
  if (s) s.skill = skill;
  saveState();
  render();
}

function toggleExcluded(id) {
  state.excluded[id] = !state.excluded[id];
  render();
}

function addRule(type, idA, idB) {
  if (!idA || !idB || idA === idB) return;
  const c = getActiveClass();
  if (!c) return;
  if (!c.rules) c.rules = { together: [], apart: [] };
  const list = c.rules[type];
  const exists = list.some(([a, b]) => (a === idA && b === idB) || (a === idB && b === idA));
  if (!exists) list.push([idA, idB]);
  saveState();
  render();
}

function removeRule(type, index) {
  const c = getActiveClass();
  if (!c || !c.rules) return;
  c.rules[type].splice(index, 1);
  saveState();
  render();
}

function pickRandom() {
  const c = getActiveClass();
  if (!c) return;
  const present = c.students.filter(s => !state.excluded[s.id]);
  let candidates = state.pickNoRepeat ? present.filter(s => !state.pickedIds[s.id]) : present;
  if (state.pickNoRepeat && candidates.length < state.pickCount) {
    // Nicht mehr genug übrig — Runde ist durch, alle wieder zulassen
    state.pickedIds = {};
    candidates = present;
  }
  const shuffled = [...candidates].sort(() => Math.random() - 0.5);
  const picked = shuffled.slice(0, Math.min(state.pickCount, shuffled.length));
  picked.forEach(s => { state.pickedIds[s.id] = true; });
  state.pickResult = picked;
  render();
}

function resetPicked() {
  state.pickedIds = {};
  state.pickResult = null;
  render();
}

// Fasst Schüler:innen, die per "Immer zusammen"-Regel verbunden sind, zu einer
// gemeinsamen Einheit zusammen, damit sie bei der Aufteilung nie getrennt werden.
function buildUnits(pool, togetherPairs) {
  const parent = {};
  pool.forEach(s => { parent[s.id] = s.id; });
  function find(x) { while (parent[x] !== x) x = parent[x]; return x; }
  function union(a, b) { const ra = find(a), rb = find(b); if (ra !== rb) parent[ra] = rb; }
  togetherPairs.forEach(([a, b]) => {
    if (parent[a] !== undefined && parent[b] !== undefined) union(a, b);
  });
  const groups = {};
  pool.forEach(s => {
    const root = find(s.id);
    (groups[root] = groups[root] || []).push(s);
  });
  return Object.values(groups).map(students => ({
    ids: students.map(s => s.id),
    students,
    skill: students.reduce((sum, s) => sum + s.skill, 0) / students.length,
  }));
}

function generateTeams() {
  const c = getActiveClass();
  if (!c) return;
  const rules = c.rules || { together: [], apart: [] };
  const pool = c.students.filter(s => !state.excluded[s.id]);
  const poolIds = new Set(pool.map(s => s.id));
  const togetherPairs = rules.together.filter(([a, b]) => poolIds.has(a) && poolIds.has(b));
  const apartPairs = rules.apart.filter(([a, b]) => poolIds.has(a) && poolIds.has(b));

  const desiredTeams = state.sizeMode === "perTeam"
    ? Math.max(2, Math.ceil((pool.length || 1) / state.studentsPerTeam))
    : state.numTeams;
  const n = Math.max(2, Math.min(desiredTeams, LEIBCHEN.length, pool.length || 2));
  const slots = Array.from({ length: n }, (_, i) => ({ id: i, students: [] }));

  const units = buildUnits(pool, togetherPairs);

  if (state.mode === "random") {
    const shuffled = [...units].sort(() => Math.random() - 0.5);
    shuffled.forEach(u => {
      const target = slots.reduce((min, s) => (s.students.length < min.students.length ? s : min), slots[0]);
      target.students.push(...u.students);
    });
  } else if (state.mode === "balanced") {
    const sorted = [...units].sort((a, b) => b.skill - a.skill);
    let i = 0, dir = 1;
    for (const u of sorted) {
      slots[i].students.push(...u.students);
      if (dir === 1 && i === n - 1) dir = -1;
      else if (dir === -1 && i === 0) dir = 1;
      else i += dir;
    }
  } else if (state.mode === "stacked") {
    const sorted = [...units].sort((a, b) => b.skill - a.skill);
    const base = Math.floor(pool.length / n);
    const extra = pool.length % n;
    let slotIdx = 0;
    let capacity = base + (slotIdx < extra ? 1 : 0);
    sorted.forEach(u => {
      if (slots[slotIdx].students.length >= capacity && slotIdx < n - 1) {
        slotIdx++;
        capacity = base + (slotIdx < extra ? 1 : 0);
      }
      slots[slotIdx].students.push(...u.students);
    });
  }

  // "Nie zusammen"-Regeln reparieren: verletzte Paare in andere Teams verschieben
  const idToUnit = {};
  units.forEach(u => u.ids.forEach(id => { idToUnit[id] = u; }));

  function slotMap() {
    const map = {};
    slots.forEach(s => s.students.forEach(st => { map[st.id] = s; }));
    return map;
  }

  for (let pass = 0; pass < 6; pass++) {
    const slotOf = slotMap();
    let changed = false;
    for (const [a, b] of apartPairs) {
      if (!slotOf[a] || !slotOf[b] || slotOf[a] !== slotOf[b]) continue;
      const unitB = idToUnit[b];
      const currentSlot = slotOf[b];
      const candidates = slots
        .filter(s => s !== currentSlot)
        .sort((x, y) => x.students.length - y.students.length);
      for (const cand of candidates) {
        const conflict = unitB.ids.some(uid =>
          cand.students.some(st =>
            apartPairs.some(([x, y]) => (x === uid && y === st.id) || (y === uid && x === st.id))
          )
        );
        if (!conflict) {
          currentSlot.students = currentSlot.students.filter(st => !unitB.ids.includes(st.id));
          cand.students.push(...unitB.students);
          changed = true;
          break;
        }
      }
    }
    if (!changed) break;
  }

  const finalSlotOf = slotMap();
  const stillViolated = apartPairs.filter(([a, b]) => finalSlotOf[a] && finalSlotOf[b] && finalSlotOf[a] === finalSlotOf[b]).length;
  state.teamsWarning = stillViolated > 0
    ? `${stillViolated} "Nie zusammen"-Regel(n) konnten nicht eingehalten werden — zu viele Einschränkungen gleichzeitig.`
    : null;

  state.teams = slots;
  render();
}

// ---- Drag & drop (pointer-based, touch + mouse) ----
let dragState = null;

function onPointerDownStudent(e, studentId, fromTeam) {
  e.currentTarget.setPointerCapture && e.currentTarget.setPointerCapture(e.pointerId);
  dragState = { studentId, fromTeam, pointerId: e.pointerId };
  render();
}

function onPointerUp(e) {
  if (!dragState) return;
  const { studentId, fromTeam } = dragState;
  const el = document.elementFromPoint(e.clientX, e.clientY);
  const teamEl = el && el.closest ? el.closest("[data-team-id]") : null;
  if (teamEl) {
    const toTeam = parseInt(teamEl.getAttribute("data-team-id"), 10);
    if (toTeam !== fromTeam && state.teams) {
      const fromSlot = state.teams.find(t => t.id === fromTeam);
      const toSlot = state.teams.find(t => t.id === toTeam);
      const sIdx = fromSlot.students.findIndex(s => s.id === studentId);
      if (sIdx > -1) {
        const [student] = fromSlot.students.splice(sIdx, 1);
        toSlot.students.push(student);
      }
    }
  }
  dragState = null;
  render();
}
document.addEventListener("pointerup", onPointerUp);

// ---- Rendering ----
function el(tag, attrs = {}, children = []) {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === "class") node.className = v;
    else if (k.startsWith("on") && typeof v === "function") node.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === "html") node.innerHTML = v;
    else if (v !== null && v !== undefined) node.setAttribute(k, v);
  }
  (Array.isArray(children) ? children : [children]).forEach(child => {
    if (child === null || child === undefined) return;
    node.appendChild(typeof child === "string" ? document.createTextNode(child) : child);
  });
  return node;
}

function starsEl(value, size, onPick) {
  const wrap = el("div", { class: "skill-picker" });
  for (let n = 1; n <= 5; n++) {
    const dot = el("button", {
      class: "skill-dot" + (n <= value ? " filled" : ""),
      style: `font-size:${size || 13}px`,
      title: `Level ${n}`,
      onClick: onPick ? () => onPick(n) : null,
    }, "★");
    if (!onPick) dot.style.cursor = "default";
    wrap.appendChild(dot);
  }
  return wrap;
}

function renderHeader() {
  const header = el("header");
  const left = el("div", { class: "header-left" }, [
    el("div", { class: "logo" }, "TT"),
    el("div", {}, [
      el("div", { class: "app-title" }, "Teamteiler"),
      el("div", { class: "app-subtitle" }, "Teams für den Sportunterricht"),
    ]),
  ]);
  header.appendChild(left);

  const wrap = el("div", { class: "class-picker-wrap" });
  const activeClass = getActiveClass();
  const btn = el("button", {
    class: "class-picker-btn",
    onClick: () => { state.showClassPicker = !state.showClassPicker; render(); },
  }, `👥 ${activeClass ? activeClass.name : "Keine Klasse"} ▾`);
  wrap.appendChild(btn);

  const dropdown = el("div", { class: "class-dropdown" + (state.showClassPicker ? " open" : "") });
  state.classes.forEach(c => {
    const item = el("div", { class: "class-dropdown-item", style: c.id === state.activeClassId ? "background:#2A3F4E" : "" });
    const nameSpan = el("span", { class: "name", onClick: () => {
      state.activeClassId = c.id;
      state.teams = null;
      state.teamsWarning = null;
      state.pickedIds = {};
      state.pickResult = null;
      state.showClassPicker = false;
      saveState();
      render();
    } },
      `${c.name} `);
    nameSpan.appendChild(el("span", { class: "count" }, `(${c.students.length})`));
    item.appendChild(nameSpan);
    item.appendChild(el("button", { class: "icon-btn", title: "Klasse löschen", onClick: () => deleteClass(c.id) }, "🗑"));
    dropdown.appendChild(item);
  });
  dropdown.appendChild(el("div", { class: "class-dropdown-divider" }));
  dropdown.appendChild(el("button", { class: "new-class-btn", onClick: createClass }, "+ Neue Klasse"));
  wrap.appendChild(dropdown);

  header.appendChild(wrap);
  return header;
}

function renderEmptyState() {
  return el("div", { class: "empty-state" }, [
    el("div", { class: "empty-icon" }, "👥"),
    el("div", { class: "empty-title" }, "Noch keine Klasse angelegt"),
    el("div", { class: "empty-text" }, "Leg eine Klasse an, um Namen einzutragen und danach Teams zu bilden."),
    el("button", { class: "btn-primary", onClick: createClass }, "+ Erste Klasse anlegen"),
  ]);
}

function renderSubHeader(activeClass) {
  const wrap = el("div", { class: "sub-header" });
  const nameRow = el("div", { class: "class-name-row" });
  if (state.editingClassName) {
    const input = el("input", { class: "class-name-input", value: activeClass.name });
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        renameActiveClass(input.value.trim() || activeClass.name);
        state.editingClassName = false;
        render();
      }
    });
    nameRow.appendChild(input);
    nameRow.appendChild(el("button", { class: "icon-btn", onClick: () => {
      renameActiveClass(input.value.trim() || activeClass.name);
      state.editingClassName = false;
      render();
    } }, "✓"));
    setTimeout(() => input.focus(), 0);
  } else {
    nameRow.appendChild(el("h1", { class: "class-name" }, activeClass.name));
    nameRow.appendChild(el("button", { class: "icon-btn", onClick: () => { state.editingClassName = true; render(); } }, "✎"));
  }
  wrap.appendChild(nameRow);

  const tabs = el("div", { class: "tab-row" }, [
    el("button", { class: "tab" + (state.view === "roster" ? " active" : ""), onClick: () => { state.view = "roster"; render(); } }, "Schüler:innen"),
    el("button", { class: "tab" + (state.view === "rules" ? " active" : ""), onClick: () => { state.view = "rules"; render(); } }, "Regeln"),
    el("button", { class: "tab" + (state.view === "generate" ? " active" : ""), onClick: () => { state.view = "generate"; render(); } }, "Teams bilden"),
    el("button", { class: "tab" + (state.view === "pick" ? " active" : ""), onClick: () => { state.view = "pick"; render(); } }, "Auswahl"),
  ]);
  wrap.appendChild(tabs);
  return wrap;
}

function renderRosterView(activeClass) {
  const wrap = el("div", { class: "content" });

  const toggleRow = el("div", { class: "mode-row", style: "margin-bottom:12px" }, [
    el("button", { class: "mode-btn" + (!state.bulkMode ? " active" : ""), onClick: () => { state.bulkMode = false; render(); } }, "Einzeln"),
    el("button", { class: "mode-btn" + (state.bulkMode ? " active" : ""), onClick: () => { state.bulkMode = true; render(); } }, "Mehrere auf einmal"),
  ]);
  wrap.appendChild(toggleRow);

  if (state.bulkMode) {
    const textarea = el("textarea", {
      class: "text-input",
      style: "width:100%;min-height:120px;resize:vertical;font-family:inherit;",
      placeholder: "Ein Name pro Zeile …\nz. B.\nAnna Meier\nBen Schulz\nClara Vogel",
    });
    textarea.value = state.bulkText;
    textarea.addEventListener("input", (e) => { state.bulkText = e.target.value; });
    wrap.appendChild(textarea);

    const addRow = el("div", { class: "add-row", style: "margin-top:10px" });
    const addBtn = el("button", { class: "btn-primary-sm", onClick: () => { addBulkStudents(); } }, "+ Alle hinzufügen");
    addRow.appendChild(addBtn);
    wrap.appendChild(addRow);
    wrap.appendChild(el("div", { class: "control-hint", style: "margin-top:6px" }, "Alle bekommen erstmal Skill-Level 3 — danach einzeln anpassbar."));
  } else {
    const addRow = el("div", { class: "add-row" });
    const nameInput = el("input", { class: "text-input", placeholder: "Name eintragen …", value: state.newName });
    nameInput.addEventListener("input", (e) => { state.newName = e.target.value; });
    nameInput.addEventListener("keydown", (e) => { if (e.key === "Enter") addStudent(); });
    addRow.appendChild(nameInput);
    addRow.appendChild(starsEl(state.newSkill, 15, (n) => { state.newSkill = n; render(); setTimeout(() => nameInput.focus(), 0); }));
    addRow.appendChild(el("button", { class: "btn-primary-sm", onClick: addStudent }, "+ Hinzufügen"));
    wrap.appendChild(addRow);
  }

  if (activeClass.students.length === 0) {
    wrap.appendChild(el("div", { class: "empty-roster" }, "Noch keine Schüler:innen eingetragen."));
  } else {
    const list = el("div", { class: "roster-list" });
    activeClass.students.forEach(s => {
      const row = el("div", { class: "roster-row" });
      row.appendChild(el("span", { class: "roster-name" + (state.excluded[s.id] ? " excluded" : "") }, s.name));
      row.appendChild(starsEl(s.skill, 13, (n) => updateStudentSkill(s.id, n)));
      row.appendChild(el("button", {
        class: "chip-btn" + (state.excluded[s.id] ? " active" : ""),
        title: "Für heute ausschließen",
        onClick: () => toggleExcluded(s.id),
      }, state.excluded[s.id] ? "fehlt" : "dabei"));
      row.appendChild(el("button", { class: "icon-btn", onClick: () => removeStudent(s.id) }, "✕"));
      list.appendChild(row);
    });
    wrap.appendChild(list);
  }

  const excludedCount = Object.values(state.excluded).filter(Boolean).length;
  wrap.appendChild(el("div", { class: "roster-footer" },
    `${activeClass.students.length} Schüler:in${activeClass.students.length === 1 ? "" : "nen"} insgesamt` +
    (excludedCount > 0 ? ` · ${excludedCount} heute ausgeschlossen` : "")
  ));

  return wrap;
}

function renderGenerateView(activeClass) {
  const wrap = el("div", { class: "content" });
  const activeCount = activeClass.students.filter(s => !state.excluded[s.id]).length;

  const panel = el("div", { class: "control-panel" });

  const sizeModeGroup = el("div", {}, [
    el("label", { class: "control-label" }, "Einstellen nach"),
    el("div", { class: "mode-row" }, [
      el("button", { class: "mode-btn" + (state.sizeMode === "teams" ? " active" : ""), onClick: () => { state.sizeMode = "teams"; render(); } }, "Anzahl Teams"),
      el("button", { class: "mode-btn" + (state.sizeMode === "perTeam" ? " active" : ""), onClick: () => { state.sizeMode = "perTeam"; render(); } }, "Spieler pro Team"),
    ]),
  ]);
  panel.appendChild(sizeModeGroup);

  const teamsGroup = state.sizeMode === "teams"
    ? el("div", {}, [
        el("label", { class: "control-label" }, "Anzahl Teams"),
        el("div", { class: "stepper" }, [
          el("button", { class: "stepper-btn", onClick: () => { state.numTeams = Math.max(2, state.numTeams - 1); render(); } }, "−"),
          el("span", { class: "stepper-value" }, String(state.numTeams)),
          el("button", { class: "stepper-btn", onClick: () => { state.numTeams = Math.min(6, state.numTeams + 1); render(); } }, "+"),
        ]),
      ])
    : el("div", {}, [
        el("label", { class: "control-label" }, "Spieler pro Team"),
        el("div", { class: "stepper" }, [
          el("button", { class: "stepper-btn", onClick: () => { state.studentsPerTeam = Math.max(2, state.studentsPerTeam - 1); render(); } }, "−"),
          el("span", { class: "stepper-value" }, String(state.studentsPerTeam)),
          el("button", { class: "stepper-btn", onClick: () => { state.studentsPerTeam = Math.min(20, state.studentsPerTeam + 1); render(); } }, "+"),
        ]),
      ]);
  panel.appendChild(teamsGroup);

  const modeGroup = el("div", {}, [
    el("label", { class: "control-label" }, "Aufteilung"),
    el("div", { class: "mode-row" }, [
      el("button", { class: "mode-btn" + (state.mode === "random" ? " active" : ""), onClick: () => { state.mode = "random"; render(); } }, "🔀 Zufällig"),
      el("button", { class: "mode-btn" + (state.mode === "balanced" ? " active" : ""), onClick: () => { state.mode = "balanced"; render(); } }, "⚖️ Ausgeglichen"),
      el("button", { class: "mode-btn" + (state.mode === "stacked" ? " active" : ""), onClick: () => { state.mode = "stacked"; render(); } }, "★ Starke zusammen"),
    ]),
  ]);
  panel.appendChild(modeGroup);

  const genBtn = el("button", { class: "btn-primary", onClick: generateTeams }, "🔀 Teams erstellen");
  if (activeCount < 2) genBtn.setAttribute("disabled", "disabled");
  panel.appendChild(genBtn);

  panel.appendChild(el("div", { class: "control-hint" },
    `${activeCount} von ${activeClass.students.length} dabei` +
    (activeClass.students.length > 0 && activeCount !== activeClass.students.length ? ` — Anwesenheit im Reiter "Schüler:innen" anpassen` : "") +
    (state.sizeMode === "perTeam" && activeCount > 0 ? ` · ergibt ${Math.max(2, Math.ceil(activeCount / state.studentsPerTeam))} Teams` : "")
  ));

  wrap.appendChild(panel);

  if (state.teams) {
    if (state.teamsWarning) {
      wrap.appendChild(el("div", { class: "control-hint", style: "color:#E8A798;margin-bottom:8px" }, `⚠️ ${state.teamsWarning}`));
    }
    wrap.appendChild(el("div", { class: "drag-hint" }, "Tippen, halten und auf ein anderes Team ziehen, um zu verschieben."));
    const grid = el("div", { class: "teams-grid" });
    state.teams.forEach(team => {
      const c = LEIBCHEN[team.id % LEIBCHEN.length];
      const card = el("div", { class: "team-card", "data-team-id": String(team.id), style: `background:${c.bgSoft};border-color:${c.bg}` });
      const head = el("div", { class: "team-header", style: `background:${c.bg};color:${c.text}` }, [
        document.createTextNode(`Team ${c.name}`),
        el("span", { class: "team-count" }, String(team.students.length)),
      ]);
      card.appendChild(head);
      const body = el("div", { class: "team-body" });
      if (team.students.length === 0) {
        body.appendChild(el("div", { class: "team-empty" }, "—"));
      }
      team.students.forEach(s => {
        const isDragging = dragState && dragState.studentId === s.id;
        const chip = el("div", { class: "student-chip" + (isDragging ? " dragging" : "") });
        chip.addEventListener("pointerdown", (e) => onPointerDownStudent(e, s.id, team.id));
        chip.appendChild(el("span", {}, s.name));
        const starsSpan = el("span", { class: "chip-stars" });
        for (let n = 1; n <= 5; n++) starsSpan.appendChild(el("span", { class: n <= s.skill ? "" : "dim" }, "★"));
        chip.appendChild(starsSpan);
        body.appendChild(chip);
      });
      card.appendChild(body);
      grid.appendChild(card);
    });
    wrap.appendChild(grid);
  }

  return wrap;
}

function renderRulesView(activeClass) {
  const wrap = el("div", { class: "content" });
  if (!activeClass.rules) activeClass.rules = { together: [], apart: [] };
  const students = activeClass.students;

  function nameOf(id) {
    const s = students.find(s => s.id === id);
    return s ? s.name : "?";
  }

  function section(title, type, emptyHint, symbol) {
    const box = el("div", { class: "control-panel" });
    box.appendChild(el("label", { class: "control-label" }, title));

    if (students.length < 2) {
      box.appendChild(el("div", { class: "empty-roster" }, "Trag zuerst mindestens zwei Schüler:innen ein."));
      return box;
    }

    const selA = el("select", { class: "text-input" });
    const selB = el("select", { class: "text-input" });
    [selA, selB].forEach(sel => {
      sel.appendChild(el("option", { value: "" }, "Schüler:in wählen …"));
      students.forEach(s => sel.appendChild(el("option", { value: s.id }, s.name)));
    });
    const row = el("div", { class: "add-row" }, [
      selA,
      selB,
      el("button", { class: "btn-primary-sm", onClick: () => addRule(type, selA.value, selB.value) }, "+ Hinzufügen"),
    ]);
    box.appendChild(row);

    const list = activeClass.rules[type];
    if (list.length === 0) {
      box.appendChild(el("div", { class: "empty-roster" }, emptyHint));
    } else {
      const listWrap = el("div", { class: "roster-list" });
      list.forEach(([a, b], idx) => {
        const rowEl = el("div", { class: "roster-row" });
        rowEl.appendChild(el("span", { class: "roster-name" }, `${nameOf(a)}  ${symbol}  ${nameOf(b)}`));
        rowEl.appendChild(el("button", { class: "icon-btn", onClick: () => removeRule(type, idx) }, "✕"));
        listWrap.appendChild(rowEl);
      });
      box.appendChild(listWrap);
    }
    return box;
  }

  wrap.appendChild(section("🤝 Immer zusammen", "together", "Noch keine Regel — z. B. wenn zwei sich gut ergänzen sollen.", "🤝"));
  wrap.appendChild(section("🚫 Nie zusammen", "apart", "Noch keine Regel — z. B. um Streit zu vermeiden.", "🚫"));

  return wrap;
}

function renderPickView(activeClass) {
  const wrap = el("div", { class: "content" });
  const present = activeClass.students.filter(s => !state.excluded[s.id]);

  const panel = el("div", { class: "control-panel" });
  panel.appendChild(el("div", {}, [
    el("label", { class: "control-label" }, "Wie viele auswählen"),
    el("div", { class: "stepper" }, [
      el("button", { class: "stepper-btn", onClick: () => { state.pickCount = Math.max(1, state.pickCount - 1); render(); } }, "−"),
      el("span", { class: "stepper-value" }, String(state.pickCount)),
      el("button", { class: "stepper-btn", onClick: () => { state.pickCount = Math.min(Math.max(present.length, 1), state.pickCount + 1); render(); } }, "+"),
    ]),
  ]));

  panel.appendChild(el("div", { class: "mode-row" }, [
    el("button", {
      class: "mode-btn" + (state.pickNoRepeat ? " active" : ""),
      onClick: () => { state.pickNoRepeat = !state.pickNoRepeat; render(); },
    }, state.pickNoRepeat ? "✓ Ohne Wiederholung, bis alle dran waren" : "Wiederholung möglich"),
  ]));

  const btnRow = el("div", { class: "add-row" });
  const pickBtn = el("button", { class: "btn-primary", onClick: pickRandom }, "🎲 Auswählen");
  if (present.length === 0) pickBtn.setAttribute("disabled", "disabled");
  btnRow.appendChild(pickBtn);
  if (state.pickNoRepeat) {
    btnRow.appendChild(el("button", { class: "btn-primary-sm", onClick: resetPicked }, "↺ Zurücksetzen"));
  }
  panel.appendChild(btnRow);

  const remaining = present.filter(s => !state.pickedIds[s.id]).length;
  panel.appendChild(el("div", { class: "control-hint" },
    `${present.length} anwesend` + (state.pickNoRepeat ? ` · ${remaining} noch nicht dran gewesen` : "")
  ));

  wrap.appendChild(panel);

  if (state.pickResult && state.pickResult.length > 0) {
    const c = LEIBCHEN[2];
    const card = el("div", { class: "team-card", style: `background:${c.bgSoft};border-color:${c.bg};max-width:340px` });
    card.appendChild(el("div", { class: "team-header", style: `background:${c.bg};color:${c.text}` }, [
      document.createTextNode("Ausgewählt"),
      el("span", { class: "team-count" }, String(state.pickResult.length)),
    ]));
    const body = el("div", { class: "team-body" });
    state.pickResult.forEach(s => {
      body.appendChild(el("div", { class: "student-chip" }, el("span", {}, s.name)));
    });
    card.appendChild(body);
    wrap.appendChild(card);
  }

  return wrap;
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  app.appendChild(renderHeader());

  const activeClass = getActiveClass();
  if (!activeClass) {
    app.appendChild(renderEmptyState());
    return;
  }
  app.appendChild(renderSubHeader(activeClass));
  let viewNode;
  if (state.view === "roster") viewNode = renderRosterView(activeClass);
  else if (state.view === "rules") viewNode = renderRulesView(activeClass);
  else if (state.view === "pick") viewNode = renderPickView(activeClass);
  else viewNode = renderGenerateView(activeClass);
  app.appendChild(viewNode);
}

loadState();
render();
</script>
</body>
</html>
